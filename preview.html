   ══════════════════════════════════════════════════ */
function GradientBg() {
  return (
    <div style={{
      position: "absolute", top: 0, left: 0, right: 0, height: 340,
      zIndex: 0, pointerEvents: "none",
      background: `linear-gradient(180deg, rgba(0,206,0,.6) 0%, rgba(0,206,0,.4) 20%, rgba(0,206,0,.2) 40%, rgba(0,206,0,.08) 60%, rgba(255,255,255,0) 100%)`,
    }}>
      <div style={{
        position: "absolute", top: -30, left: -30, width: 250, height: 250,
        background: "radial-gradient(circle, rgba(0,206,0,.35) 0%, transparent 70%)",
      }} />
      <div style={{
        position: "absolute", top: -10, right: -20, width: 200, height: 200,
        background: "radial-gradient(circle, rgba(0,206,0,.25) 0%, transparent 70%)",
      }} />
    </div>
  );
}

/* ══════════════════════════════════════════════════
   PROGRESS — 6 segments
   ══════════════════════════════════════════════════ */
function Progress({ current, total }) {
  const segs = 6;
  const filled = Math.max(1, Math.round((current / total) * segs));
  return (
    <div style={{ display: "flex", gap: 8 }}>
      {Array.from({ length: segs }).map((_, i) => (
        <div key={i} style={{
          flex: 1, height: i < filled ? 5 : 3, borderRadius: 3,
          background: i < filled ? C.white : "rgba(255,255,255,.45)",
          transition: `all .3s ${ease}`,
        }} />
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   CTA BUTTON — rainbow gradient border, sticky
   ══════════════════════════════════════════════════ */
function StickyBtn({ children, onClick, disabled }) {
  return (
    <div style={{
      position: "fixed", bottom: 20, left: 0, right: 0, zIndex: 100,
      padding: "0 16px",
      maxWidth: 420, margin: "0 auto",
      pointerEvents: disabled ? "none" : "auto",
      opacity: disabled ? 0.25 : 1,
      transition: `opacity .2s ${ease}`,
    }}>
      {/* Rainbow border wrapper */}
      <div style={{
        padding: 3,
        borderRadius: 33,
        background: "linear-gradient(90deg, #c840f5, #a445f5, #7b6bf5, #5599f0, #44d4a0, #44f060, #80f040, #d0f040, #f0d840, #f0a040, #f06040, #c840f5)",
        backgroundSize: "200% 100%",
        animation: "rainbowShift 3s linear infinite",
      }}>
        <button onClick={onClick} style={{
          width: "100%", height: 50, borderRadius: 30,
          border: "none", background: C.black, color: C.white,
          fontSize: 18, fontWeight: 600, fontFamily: F,
          cursor: "pointer", display: "block",
        }}>
          {children}
        </button>
      </div>
      <style>{`@keyframes rainbowShift{0%{background-position:0% 50%}100%{background-position:200% 50%}}`}</style>
    </div>
  );
}

/* Inline button (not sticky, for special screens) */
function InlineBtn({ children, onClick, disabled }) {
  return (
    <div style={{
      padding: 3, borderRadius: 33,
      background: "linear-gradient(90deg, #c840f5, #a445f5, #7b6bf5, #5599f0, #44d4a0, #44f060, #80f040, #d0f040, #f0d840, #f0a040, #f06040, #c840f5)",
      backgroundSize: "200% 100%",
      animation: "rainbowShift 3s linear infinite",
      opacity: disabled ? 0.25 : 1,
    }}>
      <button onClick={disabled ? undefined : onClick} style={{
        width: "100%", height: 50, borderRadius: 30,
        border: "none", background: C.black, color: C.white,
        fontSize: 18, fontWeight: 600, fontFamily: F,
        cursor: disabled ? "default" : "pointer",
      }}>
        {children}
      </button>
    </div>
  );
}

   OPTION CARD
   ══════════════════════════════════════════════════ */
function OptCard({ emoji, label, selected, onClick }) {
  return (
    <button onClick={onClick} style={{
      display: "flex", alignItems: "center", gap: 18,
      width: "100%", padding: "20px 22px", borderRadius: 16,
      border: selected ? `2.5px solid ${C.green}` : "2px solid transparent",
      background: C.card, color: C.black, fontSize: 17, fontWeight: 600,

      {emoji && <span style={{ fontSize: 28, lineHeight: 1, flexShrink: 0 }}>{emoji}</span>}
      <span style={{ flex: 1, lineHeight: 1.2 }}>{label}</span>
    </button>
  );
}

/* ══════════════════════════════════════════════════
   AGE PICKER — fixed: no infinite scroll loop
   Uses touch/click to select, no onScroll state update
   ══════════════════════════════════════════════════ */
function AgePicker({ selected, onChange, min = 18, max = 80, defaultVal = 30 }) {
  const values = Array.from({ length: max - min + 1 }, (_, i) => min + i);
  const W = 90;
  const containerRef = useRef(null);
  const scrollTimer = useRef(null);
  const programmatic = useRef(false);
  const didMount = useRef(false);

  const doScroll = useCallback((val, smooth) => {
    const el = containerRef.current;
    if (!el) return;
    const idx = values.indexOf(val);
    // spacer width = (containerWidth - W) / 2
    // item center at: spacer + idx*W + W/2
    // we want that at container center = scrollLeft + containerWidth/2
    // scrollLeft = spacer + idx*W + W/2 - containerWidth/2
    //            = (cW - W)/2 + idx*W + W/2 - cW/2
    //            = idx * W
    const target = idx * W;
    if (smooth) {
      el.scrollTo({ left: target, behavior: "smooth" });
    } else {
      el.scrollLeft = target;
    }
  }, [values]);

  // Measure and center on mount
  useEffect(() => {
    programmatic.current = true;
    const frame1 = requestAnimationFrame(() => {
      doScroll(selected, false);
      const frame2 = requestAnimationFrame(() => {
        doScroll(selected, false);
        setTimeout(() => {
          doScroll(selected, false);
          programmatic.current = false;
          didMount.current = true;
        }, 80);
      });
    });
    return () => cancelAnimationFrame(frame1);
  }, []);

  // Scroll when user clicks a number
  const handleClick = useCallback((v) => {
    programmatic.current = true;
    onChange(v);
    doScroll(v, true);
    setTimeout(() => { programmatic.current = false; }, 450);
  }, [onChange, doScroll]);

  const handleScrollEnd = useCallback(() => {
    if (!containerRef.current || programmatic.current) return;
    const el = containerRef.current;
    // Reverse: scrollLeft = idx * W => idx = scrollLeft / W
    const idx = Math.round(el.scrollLeft / W);
    const clamped = Math.max(0, Math.min(values.length - 1, idx));
    if (values[clamped] !== selected) {
      onChange(values[clamped]);
    }
  }, [selected, onChange, values]);

  const handleScroll = useCallback(() => {
    if (programmatic.current) return;
    if (scrollTimer.current) clearTimeout(scrollTimer.current);
    scrollTimer.current = setTimeout(handleScrollEnd, 120);
  }, [handleScrollEnd]);

  const getStyle = (v) => {
    const diff = Math.abs(v - selected);
    if (diff === 0) return { fontSize: 72, fontWeight: 800, color: C.green, opacity: 1 };
    if (diff === 1) return { fontSize: 40, fontWeight: 700, color: C.green, opacity: 0.55 };
    if (diff === 2) return { fontSize: 32, fontWeight: 600, color: C.green, opacity: 0.3 };
    return { fontSize: 28, fontWeight: 500, color: C.green, opacity: 0.15 };
  };

  // Spacer = half container minus half item. We use a CSS trick: 50vw won't work in artifact,
  // so we use a ref-based approach with state.
  const [spacer, setSpacer] = useState(150);
  useEffect(() => {
    if (containerRef.current) {
      const cW = containerRef.current.clientWidth;
      setSpacer(Math.max(0, Math.floor((cW - W) / 2)));
    }
  }, []);

  return (
    <div style={{ position: "relative", overflow: "hidden" }}>
      <div
        ref={containerRef}
        onScroll={handleScroll}
        className="hscroll"
        style={{
          display: "flex", overflowX: "auto",
          WebkitOverflowScrolling: "touch",
          alignItems: "center",
          height: 120,
        }}
      >
        <div style={{ minWidth: spacer, flexShrink: 0 }} />
        {values.map((v) => {
          const s = getStyle(v);
          return (
            <div key={v} onClick={() => handleClick(v)} style={{
              minWidth: W, flexShrink: 0, display: "flex", alignItems: "center",
              justifyContent: "center", cursor: "pointer",
            }}>
              <span style={{
                fontSize: s.fontSize, fontWeight: s.fontWeight,
                color: s.color, opacity: s.opacity, fontFamily: F,
                transition: `all .1s ${ease}`, lineHeight: 1,
              }}>{v}</span>
            </div>
          );
        })}
        <div style={{ minWidth: spacer, flexShrink: 0 }} />
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════════════ */
function Blur({ children }) {
  return (
    <span style={{ filter: "blur(10px)", userSelect: "none", WebkitUserSelect: "none", display: "inline-block" }}>
      {children}
    </span>
  );
}

function Ring({ pct, size = 160, sw = 10, color = C.green, children }) {
  const r = (size - sw) / 2;
  const circ = 2 * Math.PI * r;
  return (
    <div style={{ position: "relative", width: size, height: size, margin: "0 auto" }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={C.card} strokeWidth={sw} />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeDasharray={circ} strokeDashoffset={circ - circ * pct / 100} strokeLinecap="round"
          style={{ transition: `stroke-dashoffset 1s ${ease}` }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
        {children}
      </div>
    </div>
  );
}

function LoadDots() {
  return (
    <span>
      {[0, 1, 2].map((i) => (
        <span key={i} style={{
          display: "inline-block", width: 7, height: 7, borderRadius: "50%",
          background: C.green, margin: "0 3px",
          animation: `ldot 1.2s ${ease} ${i * 0.2}s infinite`,
        }} />
      ))}
      <style>{`@keyframes ldot{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:1;transform:scale(1.15)}}`}</style>
    </span>

                      background: sel && isTrial ? C.green : "transparent",
                    }}>
                      <p style={{ fontFamily: F, fontSize: 26, fontWeight: 800, color: sel && isTrial ? C.white : C.black, margin: 0 }}>{p.price}</p>
                      <p style={{ fontFamily: F, fontSize: 11, color: sel && isTrial ? "rgba(255,255,255,.7)" : C.muted, margin: "2px 0 0" }}>{p.priceSub}</p>
                    </div>
                  </div>
                </div>
              );
            })}

            {/* ── Section 5: Legal ── */}
            <div style={{ textAlign: "center", marginTop: 24, fontFamily: F }}>
              <p style={{ fontSize: 12, color: C.muted, margin: "0 0 12px" }}>
                By continuing I accept <span style={{ textDecoration: "underline" }}>Privacy Policy</span> & <span style={{ textDecoration: "underline" }}>Terms of Use</span>
              </p>
              <p style={{ fontSize: 11, color: C.muted, lineHeight: 1.5, margin: 0 }}>
                1-Month plan expires {new Date(Date.now() + 30*24*60*60*1000).toLocaleDateString("en", { month: "long", day: "numeric", year: "numeric" })}. Today you will be charged $1 for 3-days trial, then $39.99 after trial per month. Cancel anytime and you won't be charged the next period payment. To cancel: support@foodzee.tech
              </p>
            </div>
          </div>
        );
      }

      default: return null;
    }
  };

  /* Sticky button logic */
  const stickyAction = () => {
    if (step === STEP.WELCOME) {
      next();
    } else if (step === STEP.AGE) {
      next();
    } else if (step === STEP.HEART_RATE) {
      next();
    } else if (step === STEP.TRANSITION) {
      next();
    } else if (step === STEP.PAYWALL) {
      alert("→ Open App Store / Google Play");
    }
  };

  const stickyLabel = () => {
    if (step === STEP.WELCOME) return "Start quiz";
    if (step === STEP.PAYWALL) return "Get my plan";
    return "Continue";
  };

  const stickyDisabled = false;
  const showStickyBtn = [STEP.WELCOME, STEP.AGE, STEP.HEART_RATE, STEP.TRANSITION, STEP.PAYWALL].includes(step);

  return (
    <div ref={scrollRef} style={{ minHeight: "100vh", background: C.white, fontFamily: F, overflowY: "auto", position: "relative" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { margin: 0; background: #fff; }
        .hscroll::-webkit-scrollbar { display: none; }
        .hscroll { -ms-overflow-style: none; scrollbar-width: none; }
      `}</style>

      {!isTransition && step !== STEP.ANALYZE && step !== STEP.WELCOME && (<GradientBg />)}

      {/* Welcome green bg */}
      {step === STEP.WELCOME && (
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, background: "#A5F3A5", zIndex: 0, pointerEvents: "none" }} />
      )}

      {showNav && (
        <div style={{ position: "relative", zIndex: 10, padding: "20px 16px 0", maxWidth: 420, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <button onClick={prev} style={{
              background: "none", border: "none", fontSize: 26,
              cursor: "pointer", color: C.black, padding: 0, lineHeight: 1,
            }}>←</button>
            <div style={{ flex: 1 }}>
              <Progress current={step - NAV_START + 1} total={NAV_TOTAL} />
            </div>
          </div>
        </div>
      )}

      <div style={{
        position: "relative", zIndex: 5, maxWidth: 420, margin: "0 auto",
        padding: isTransition ? "0" : "0 16px 60px",
        opacity: fade ? 1 : 0, transform: fade ? "translateY(0)" : "translateY(8px)",
        transition: `all .2s ${ease}`,
      }}>
        {renderContent()}
      </div>

      {showStickyBtn && (
        <>
          {step === STEP.WELCOME && (
            <div style={{
              position: "fixed", bottom: 86, left: 0, right: 0, zIndex: 100,
              textAlign: "center",
            }}>
              <p style={{ fontSize: 12, color: C.black, opacity: 0.4, fontFamily: F, margin: 0 }}>
                Your data is anonymous and secure 🔒
              </p>
            </div>
          )}
          <StickyBtn onClick={stickyAction} disabled={stickyDisabled}>
            {stickyLabel()}
          </StickyBtn>
        </>
      )}
    </div>
  );
}

    const App = BioAgeFunnel;
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
